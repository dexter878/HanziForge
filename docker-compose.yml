services:
  backend:
    build:
      context: ./backend
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: sqlite:////data/hanzi.db
      SECRET_KEY: hanzi-forge-secret-key-2024
    volumes:
      - backend_data:/data
      - teacher_audio:/app/static/audio/teacher
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5004:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  teacher_audio:
